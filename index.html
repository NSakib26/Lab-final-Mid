<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>National Technology Workshop Registration</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h2>National Technology Workshop Registration</h2>

<form id="regForm">

<label for="fname">First Name</label>
<input type="text" id="fname" placeholder="Enter your first name">
<small id="fnameError" class="error"></small>

<label for="lname">Last Name</label>
<input type="text" id="lname" placeholder="Enter your last name">
<small id="lnameError" class="error"></small>

<label for="email">Email Address</label>
<input type="email" id="email" placeholder="example@gmail.com">
<small id="emailError" class="error"></small>

<label for="password">Password</label>
<input type="password" id="password" placeholder="Enter password">
<small id="passwordError" class="error"></small>

<label>Gender</label>

<div class="radio-group">
<input type="radio" id="male" name="gender" value="Male">
<label for="male">Male</label>

<input type="radio" id="female" name="gender" value="Female">
<label for="female">Female</label>
</div>

<small id="genderError" class="error"></small>

<label>Interests</label>

<div class="checkbox-group">
<input type="checkbox" id="programming"
name="interest" value="Programming">
<label for="programming">Programming</label>

<input type="checkbox" id="ai"
name="interest" value="AI">
<label for="ai">AI</label>

<input type="checkbox" id="networking"
name="interest" value="Networking">
<label for="networking">Networking</label>
</div>

<small id="interestError" class="error"></small>

<label for="department">Department</label>

<select id="department">
<option value="">-- Select Department --</option>
<option value="CSE">CSE</option>
<option value="EEE">EEE</option>
<option value="BBA">BBA</option>
</select>

<small id="deptError" class="error"></small>

<label for="about">About Yourself</label>

<textarea id="about" rows="4"
placeholder="Write about yourself"></textarea>

<small id="aboutError" class="error"></small>

<button type="submit">Submit</button>

<p id="success"></p>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
